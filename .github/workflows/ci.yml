name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --prefix frontend
      - run: make check
      - run: make test-race

  mysql-integration:
    name: MySQL integration
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      mysql:
        image: mysql:8.4.6
        env:
          MYSQL_DATABASE: blog_integration
          MYSQL_USER: blog_test
          MYSQL_PASSWORD: integration-only-password
          MYSQL_ROOT_PASSWORD: integration-only-root-password
        ports:
          - 33306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -ublog_test -pintegration-only-password"
          --health-interval=2s
          --health-timeout=3s
          --health-retries=30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - run: make test-integration
