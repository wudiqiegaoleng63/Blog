# Explicit opt-in local debugging override:
# docker compose -f deploy/compose.yaml -f deploy/compose.dev.yaml up
services:
  api:
    ports:
      - "127.0.0.1:${API_DEBUG_PORT:-8081}:8080"

  mysql:
    ports:
      - "127.0.0.1:${MYSQL_DEBUG_PORT:-3306}:3306"

  redis:
    ports:
      - "127.0.0.1:${REDIS_DEBUG_PORT:-6379}:6379"
