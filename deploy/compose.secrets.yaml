# Production overlay: sensitive application values are mounted as files instead
# of ordinary container environment variables. Secret source files must be
# provisioned out-of-band with mode 0600 and never committed.

x-secret-files: &secret-files
  MYSQL_DSN_FILE: /run/secrets/mysql_dsn
  REDIS_PASSWORD_FILE: /run/secrets/redis_password
  JWT_SECRET_FILE: /run/secrets/jwt_secret
  AI_CHAT_API_KEY_FILE: /run/secrets/ai_chat_api_key
  AI_EMBEDDING_API_KEY_FILE: /run/secrets/ai_embedding_api_key
  MILVUS_PASSWORD_FILE: /run/secrets/milvus_password

x-app-secrets: &app-secrets
  - mysql_dsn
  - redis_password
  - jwt_secret
  - ai_chat_api_key
  - ai_embedding_api_key
  - milvus_password

services:
  api:
    environment:
      <<: *secret-files
      MYSQL_DSN: ""
      REDIS_PASSWORD: ""
      JWT_SECRET: ""
      AI_CHAT_API_KEY: ""
      AI_EMBEDDING_API_KEY: ""
      MILVUS_PASSWORD: ""
    secrets: *app-secrets

  worker:
    environment:
      <<: *secret-files
      MYSQL_DSN: ""
      REDIS_PASSWORD: ""
      JWT_SECRET: ""
      AI_CHAT_API_KEY: ""
      AI_EMBEDDING_API_KEY: ""
      MILVUS_PASSWORD: ""
    secrets: *app-secrets

  migrate:
    environment:
      MYSQL_DSN: ""
      MYSQL_DSN_FILE: /run/secrets/mysql_dsn
    secrets:
      - mysql_dsn

  mysql:
    environment:
      MYSQL_PASSWORD: ""
      MYSQL_PASSWORD_FILE: /run/secrets/mysql_password
      MYSQL_ROOT_PASSWORD: ""
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/mysql_root_password
    secrets:
      - mysql_password
      - mysql_root_password
    healthcheck:
      test: ["CMD-SHELL", "mysql --protocol=TCP -h 127.0.0.1 -u\"$$MYSQL_USER\" -p\"$$(cat $$MYSQL_PASSWORD_FILE)\" \"$$MYSQL_DATABASE\" -e 'SELECT 1' >/dev/null 2>&1"]

  redis:
    environment:
      REDIS_PASSWORD: ""
      REDIS_PASSWORD_FILE: /run/secrets/redis_password
    secrets:
      - redis_password
    command: ["sh", "-c", "exec redis-server --appendonly yes --requirepass \"$$(cat $$REDIS_PASSWORD_FILE)\""]
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=$$(cat $$REDIS_PASSWORD_FILE) redis-cli ping | grep -q PONG"]

secrets:
  mysql_dsn:
    file: ${SECRETS_DIR:?SECRETS_DIR is required}/mysql_dsn
  redis_password:
    file: ${SECRETS_DIR:?SECRETS_DIR is required}/redis_password
  jwt_secret:
    file: ${SECRETS_DIR:?SECRETS_DIR is required}/jwt_secret
  ai_chat_api_key:
    file: ${SECRETS_DIR:?SECRETS_DIR is required}/ai_chat_api_key
  ai_embedding_api_key:
    file: ${SECRETS_DIR:?SECRETS_DIR is required}/ai_embedding_api_key
  milvus_password:
    file: ${SECRETS_DIR:?SECRETS_DIR is required}/milvus_password
  mysql_password:
    file: ${SECRETS_DIR:?SECRETS_DIR is required}/mysql_password
  mysql_root_password:
    file: ${SECRETS_DIR:?SECRETS_DIR is required}/mysql_root_password
