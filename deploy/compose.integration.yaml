name: blog-integration

services:
  mysql-integration:
    image: mysql:8.4.6
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --default-time-zone=+00:00
    environment:
      MYSQL_DATABASE: blog_integration
      MYSQL_USER: blog_test
      MYSQL_PASSWORD: integration-only-password
      MYSQL_ROOT_PASSWORD: integration-only-root-password
    tmpfs:
      - /var/lib/mysql
    ports:
      - "127.0.0.1:${INTEGRATION_MYSQL_PORT:-33306}:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysql --protocol=TCP -h 127.0.0.1 -ublog_test -pintegration-only-password blog_integration -e 'SELECT 1' >/dev/null 2>&1"]
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 10s
    security_opt:
      - no-new-privileges:true
