worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $request_id [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" forwarded_for="$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 2m;

    map $http_x_request_id $request_id_to_upstream {
        default $http_x_request_id;
        ""      $request_id;
    }

    resolver 127.0.0.11 valid=10s ipv6=off;

    upstream blog_api {
        zone blog_api 64k;
        server api:8080 resolve;
        keepalive 32;
    }

    server {
        listen 8080;
        server_name _;

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        location = / {
            default_type application/json;
            return 200 '{"status":"ok","stage":1,"message":"backend API is available under /api/v1; frontend is not included"}\n';
        }

        location = /health {
            return 308 /health/;
        }

        location /health/ {
            proxy_pass http://blog_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Request-ID $request_id_to_upstream;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
        }

        location /api/ {
            proxy_pass http://blog_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Request-ID $request_id_to_upstream;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
        }

        location / {
            default_type application/json;
            return 404 '{"error":"not_found","message":"route not found; frontend is not included"}\n';
        }
    }
}
