name: blog

x-backend-service: &backend-service
  image: blog-backend:${BLOG_BACKEND_IMAGE_TAG:-stage1}
  build:
    context: ../backend
    dockerfile: Dockerfile
  networks:
    - core
  security_opt:
    - no-new-privileges:true

x-app-environment: &app-environment
  APP_NAME: ${APP_NAME:-blog}
  APP_ENV: ${APP_ENV:-production}
  APP_REQUEST_TIMEOUT: ${APP_REQUEST_TIMEOUT:-15s}
  HTTP_ADDR: :8080
  HTTP_READ_TIMEOUT: ${HTTP_READ_TIMEOUT:-15s}
  HTTP_WRITE_TIMEOUT: ${HTTP_WRITE_TIMEOUT:-30s}
  HTTP_IDLE_TIMEOUT: ${HTTP_IDLE_TIMEOUT:-60s}
  HTTP_SHUTDOWN_TIMEOUT: ${HTTP_SHUTDOWN_TIMEOUT:-15s}
  HTTP_MAX_BODY_BYTES: ${HTTP_MAX_BODY_BYTES:-2097152}
  HTTP_TRUSTED_PROXIES: ${HTTP_TRUSTED_PROXIES:-172.28.0.0/16}
  MYSQL_DSN: ${MYSQL_DSN:-}
  MYSQL_MAX_OPEN_CONNS: ${MYSQL_MAX_OPEN_CONNS:-25}
  MYSQL_MAX_IDLE_CONNS: ${MYSQL_MAX_IDLE_CONNS:-5}
  MYSQL_CONN_MAX_LIFETIME: ${MYSQL_CONN_MAX_LIFETIME:-30m}
  MYSQL_CONN_MAX_IDLE_TIME: ${MYSQL_CONN_MAX_IDLE_TIME:-5m}
  REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
  REDIS_USERNAME: ${REDIS_USERNAME:-}
  REDIS_PASSWORD: ${REDIS_PASSWORD:-}
  REDIS_DB: ${REDIS_DB:-0}
  REDIS_DIAL_TIMEOUT: ${REDIS_DIAL_TIMEOUT:-5s}
  REDIS_READ_TIMEOUT: ${REDIS_READ_TIMEOUT:-3s}
  REDIS_WRITE_TIMEOUT: ${REDIS_WRITE_TIMEOUT:-3s}
  REDIS_POOL_SIZE: ${REDIS_POOL_SIZE:-10}
  REDIS_KEY_PREFIX: ${REDIS_KEY_PREFIX:-blog:production:v1:}
  JWT_SECRET: ${JWT_SECRET:-}
  ACCESS_TOKEN_TTL: ${ACCESS_TOKEN_TTL:-15m}
  REFRESH_TOKEN_TTL: ${REFRESH_TOKEN_TTL:-720h}
  AUTH_REFRESH_COOKIE_NAME: ${AUTH_REFRESH_COOKIE_NAME:-blog_rt}
  AUTH_REFRESH_COOKIE_PATH: ${AUTH_REFRESH_COOKIE_PATH:-/api/v1/auth}
  AUTH_COOKIE_DOMAIN: ${AUTH_COOKIE_DOMAIN:-}
  AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-true}
  ARGON2_MEMORY_KIB: ${ARGON2_MEMORY_KIB:-65536}
  ARGON2_ITERATIONS: ${ARGON2_ITERATIONS:-3}
  ARGON2_PARALLELISM: ${ARGON2_PARALLELISM:-2}
  CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
  CORS_ALLOWED_METHODS: ${CORS_ALLOWED_METHODS:-GET,POST,PUT,PATCH,DELETE,OPTIONS}
  CORS_ALLOWED_HEADERS: ${CORS_ALLOWED_HEADERS:-Authorization,Content-Type,X-CSRF-Token,X-Request-ID}
  CORS_EXPOSED_HEADERS: ${CORS_EXPOSED_HEADERS:-}
  CORS_ALLOW_CREDENTIALS: ${CORS_ALLOW_CREDENTIALS:-true}
  CORS_MAX_AGE: ${CORS_MAX_AGE:-12h}
  RATE_REGISTER_PER_MINUTE: ${RATE_REGISTER_PER_MINUTE:-5}
  RATE_LOGIN_PER_MINUTE: ${RATE_LOGIN_PER_MINUTE:-10}
  RATE_REFRESH_PER_MINUTE: ${RATE_REFRESH_PER_MINUTE:-30}
  RATE_COMMENT_PER_MINUTE: ${RATE_COMMENT_PER_MINUTE:-10}
  RATE_AI_PER_MINUTE: ${RATE_AI_PER_MINUTE:-10}
  JOBS_POLL_INTERVAL: ${JOBS_POLL_INTERVAL:-2s}
  JOBS_MAX_ATTEMPTS: ${JOBS_MAX_ATTEMPTS:-5}
  JOBS_LOCK_SECONDS: ${JOBS_LOCK_SECONDS:-60}
  JOBS_BATCH_SIZE: ${JOBS_BATCH_SIZE:-10}
  WORKER_HEARTBEAT_MAX_AGE_SECONDS: ${WORKER_HEARTBEAT_MAX_AGE_SECONDS:-90}
  AI_ENABLED: ${AI_ENABLED:-false}
  AI_INDEXING_ENABLED: ${AI_INDEXING_ENABLED:-false}
  AI_RAG_ENABLED: ${AI_RAG_ENABLED:-false}
  AI_CHAT_BASE_URL: ${AI_CHAT_BASE_URL:-}
  AI_CHAT_API_KEY: ${AI_CHAT_API_KEY:-}
  AI_CHAT_MODEL: ${AI_CHAT_MODEL:-}
  AI_CHAT_MAX_TOKENS: ${AI_CHAT_MAX_TOKENS:-1200}
  AI_CHAT_TIMEOUT: ${AI_CHAT_TIMEOUT:-90s}
  AI_CHAT_STREAM_IDLE_TIMEOUT: ${AI_CHAT_STREAM_IDLE_TIMEOUT:-45s}
  AI_CHAT_MAX_RETRIES: ${AI_CHAT_MAX_RETRIES:-2}
  AI_EMBEDDING_BASE_URL: ${AI_EMBEDDING_BASE_URL:-}
  AI_EMBEDDING_API_KEY: ${AI_EMBEDDING_API_KEY:-}
  AI_EMBEDDING_MODEL: ${AI_EMBEDDING_MODEL:-}
  AI_EMBEDDING_DIMENSIONS: ${AI_EMBEDDING_DIMENSIONS:-0}
  AI_EMBEDDING_BATCH_SIZE: ${AI_EMBEDDING_BATCH_SIZE:-32}
  AI_EMBEDDING_TIMEOUT: ${AI_EMBEDDING_TIMEOUT:-30s}
  AI_EMBEDDING_MAX_RETRIES: ${AI_EMBEDDING_MAX_RETRIES:-3}
  AI_INDEX_CHUNK_CHARS: ${AI_INDEX_CHUNK_CHARS:-1200}
  AI_INDEX_CHUNK_OVERLAP_CHARS: ${AI_INDEX_CHUNK_OVERLAP_CHARS:-160}
  MILVUS_ADDR: ${MILVUS_ADDR:-http://milvus:19530}
  MILVUS_COLLECTION_NAME: ${MILVUS_COLLECTION_NAME:-blog_chunks_v1}
  MILVUS_COLLECTION_ALIAS: ${MILVUS_COLLECTION_ALIAS:-blog_chunks_active}
  MILVUS_USERNAME: ${MILVUS_USERNAME:-}
  MILVUS_PASSWORD: ${MILVUS_PASSWORD:-}
  MILVUS_DIAL_TIMEOUT: ${MILVUS_DIAL_TIMEOUT:-5s}
  MILVUS_CONNECT_TIMEOUT: ${MILVUS_CONNECT_TIMEOUT:-10s}
  RAG_TOP_K: ${RAG_TOP_K:-20}
  RAG_FINAL_CHUNKS: ${RAG_FINAL_CHUNKS:-6}
  RAG_MAX_CHUNKS_PER_POST: ${RAG_MAX_CHUNKS_PER_POST:-3}
  RAG_SCORE_THRESHOLD: ${RAG_SCORE_THRESHOLD:-0.0}
  RAG_MAX_QUESTION_CHARS: ${RAG_MAX_QUESTION_CHARS:-2000}
  LOG_LEVEL: ${LOG_LEVEL:-info}
  LOG_FORMAT: ${LOG_FORMAT:-json}
  METRICS_ADDR: ${METRICS_ADDR:-:9090}
  REQUEST_ID_HEADER: ${REQUEST_ID_HEADER:-X-Request-ID}

services:
  proxy:
    image: nginx:1.28.0-alpine3.21
    ports:
      - "${PROXY_BIND_ADDRESS:-0.0.0.0}:${PROXY_PORT:-8080}:8080"
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - core
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/health/ready"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  frontend:
    image: blog-frontend:${BLOG_FRONTEND_IMAGE_TAG:-stage2}
    build:
      context: ../frontend
      dockerfile: Dockerfile
    networks:
      - core
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  api:
    <<: *backend-service
    command: ["api"]
    environment:
      <<: *app-environment
      APP_SERVICE_MODE: api
    depends_on:
      migrate:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
        required: false
      milvus:
        condition: service_healthy
        required: false
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/health/ready"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    stop_grace_period: ${API_STOP_GRACE_PERIOD:-20s}

  worker:
    <<: *backend-service
    command: ["worker"]
    environment:
      <<: *app-environment
      APP_SERVICE_MODE: worker
    depends_on:
      migrate:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
        required: false
      milvus:
        condition: service_healthy
        required: false
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/worker-heartbeat && test $$(( $$(date +%s) - $$(stat -c %Y /tmp/worker-heartbeat) )) -lt $${WORKER_HEARTBEAT_MAX_AGE_SECONDS:-90}"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  migrate:
    <<: *backend-service
    command: ["migrate", "up"]
    environment:
      APP_ENV: ${APP_ENV:-production}
      MYSQL_DSN: ${MYSQL_DSN:-}
    depends_on:
      mysql:
        condition: service_healthy
    restart: "no"

  mysql:
    image: mysql:8.4.6
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --default-time-zone=+00:00
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-blog}
      MYSQL_USER: ${MYSQL_USER:-blog}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - core
    healthcheck:
      test: ["CMD-SHELL", "mysql --protocol=TCP -h 127.0.0.1 -u\"$$MYSQL_USER\" -p\"$$MYSQL_PASSWORD\" \"$$MYSQL_DATABASE\" -e 'SELECT 1' >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:7.4.5-alpine3.21
    command: ["sh", "-c", "exec redis-server --appendonly yes --requirepass \"$$REDIS_PASSWORD\""]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    networks:
      - core
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=\"$$REDIS_PASSWORD\" redis-cli ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  milvus:
    image: milvusdb/milvus:v2.5.9
    command: ["milvus", "run", "standalone"]
    volumes:
      - milvus_data:/var/lib/milvus
    networks:
      - core
    environment:
      ETCD_USE_EMBED: "true"
      COMMON_STORAGETYPE: local
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:9091/healthz"]
      interval: 10s
      timeout: 7s
      retries: 15
      start_period: 30s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

volumes:
  mysql_data:
  redis_data:
  milvus_data:

networks:
  core:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
